<!DOCTYPE html>
<html lang="zh-HK">
<head>
	<meta charset="utf-8">
	<title>街頭魚蝦蟹 (Street Corner Fish-Prawn-Crab)</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<style>
		:root {
			--gold: #ffd700;
			--neon-blue: #00e5ff;
			--temple-red: #801a1a;
			--board-bg: #e2cca2;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			user-select: none;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
		}

		body, html {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background-color: #07050a;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		#game-container {
			position: relative;
			width: 100%;
			max-width: 800px;
			height: 100%;
			max-height: 600px;
			background-color: #0d0912;
			border: 2px solid rgba(255, 215, 0, 0.35);
			border-radius: 12px;
			box-shadow: 0 0 35px rgba(255, 215, 0, 0.15);
			overflow: hidden;
		}

		#game-canvas {
			width: 100%;
			height: 100%;
			display: block;
		}

		/* HUD and Panel cards */
		.hud-panel {
			position: absolute;
			top: 15px;
			left: 15px;
			right: 15px;
			display: flex;
			justify-content: space-between;
			align-items: flex-start;
			pointer-events: none;
			z-index: 10;
		}

		.hud-card {
			background: rgba(13, 9, 18, 0.85);
			border: 1px solid rgba(255, 215, 0, 0.35);
			border-radius: 8px;
			padding: 8px 16px;
			color: #fff;
			font-size: 0.9rem;
			pointer-events: auto;
			backdrop-filter: blur(5px);
			box-shadow: 0 4px 10px rgba(0,0,0,0.6);
		}

		.score-label {
			color: var(--gold);
			font-weight: bold;
			font-size: 1.25rem;
			font-family: monospace;
			text-shadow: 0 0 5px rgba(255,215,0,0.3);
		}

		/* Play Cardboard Mat Board */
		.mat-board {
			position: absolute;
			bottom: 120px;
			left: 15px;
			right: 15px;
			height: 240px;
			background: var(--board-bg);
			border: 8px double #8a3324;
			border-radius: 8px;
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			grid-template-rows: repeat(2, 1fr);
			gap: 4px;
			padding: 4px;
			box-shadow: 0 8px 20px rgba(0,0,0,0.6);
			z-index: 10;
		}

		.mat-tile {
			border: 2px dashed #8a3324;
			background-color: rgba(255, 255, 255, 0.25);
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			cursor: pointer;
			transition: all 0.2s;
			position: relative;
		}

		.mat-tile:hover {
			background-color: rgba(255, 255, 255, 0.55);
		}

		.tile-emoji {
			font-size: 2.2rem;
		}

		.tile-name {
			font-size: 0.85rem;
			font-weight: bold;
			color: #4d1c14;
			margin-top: 2px;
		}

		.tile-bet-badge {
			position: absolute;
			top: 5px;
			right: 5px;
			background-color: #8a3324;
			color: #fff;
			font-size: 0.75rem;
			font-weight: bold;
			padding: 2px 6px;
			border-radius: 10px;
			display: none;
		}

		/* Bottom Control buttons */
		.control-panel {
			position: absolute;
			bottom: 20px;
			left: 15px;
			right: 15px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			z-index: 20;
		}

		.game-btn {
			background: linear-gradient(180deg, #8a3324 0%, #4d1c14 100%);
			color: #fff;
			border: 1px solid rgba(255,255,255,0.15);
			padding: 12px 20px;
			border-radius: 8px;
			font-weight: bold;
			cursor: pointer;
			transition: all 0.2s;
			box-shadow: 0 4px 10px rgba(0,0,0,0.4);
		}

		.game-btn:hover {
			transform: scale(1.02);
			background: linear-gradient(180deg, #aa4434 0%, #66271c 100%);
		}

		.game-btn:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}

		/* Excel Camouflage */
		#camo-overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background-color: #f3f2f1;
			z-index: 1000;
			display: none;
			flex-direction: column;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			color: #323130;
		}

		.excel-titlebar {
			background-color: #107c41;
			color: white;
			padding: 8px 16px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			font-size: 0.85rem;
			font-weight: 600;
		}

		.excel-toolbar {
			background-color: #f3f2f1;
			border-bottom: 1px solid #e1dfdd;
			padding: 6px 16px;
			display: flex;
			gap: 20px;
			font-size: 0.8rem;
		}

		.excel-grid-container {
			flex: 1;
			overflow: auto;
		}

		.excel-table {
			border-collapse: collapse;
			background-color: white;
			width: 100%;
		}

		.excel-table th, .excel-table td {
			border: 1px solid #d2d0ce;
			padding: 6px 12px;
			font-size: 0.8rem;
		}

		.excel-table th {
			background-color: #f3f2f1;
			font-weight: normal;
			color: #323130;
		}

		.excel-cell-header {
			background-color: #f3f2f1;
			text-align: center;
			color: #505050;
			width: 40px;
		}
	</style>
</head>
<body>
	<div id="game-container">
		<canvas id="game-canvas"></canvas>

		<!-- HUD panel overlay -->
		<div class="hud-panel">
			<div class="hud-card">
				<div>🎲 街頭魚蝦蟹</div>
				<div style="margin-top: 4px;">本金: <span class="score-label" id="score-val">1000</span></div>
			</div>
			<div class="hud-card" style="text-align: right;">
				<div id="game-state-label" style="font-weight: bold; color: var(--gold);">點擊木格子下注 (Bet)</div>
				<div style="margin-top: 4px; font-size: 0.72rem; color: #8c89ad;">按 [空格鍵] 扮工</div>
			</div>
		</div>

		<!-- Cardboard betting mat -->
		<div class="mat-board">
			<div class="mat-tile" data-symbol="0">
				<div class="tile-emoji">🐟</div>
				<div class="tile-name">魚 (Fish)</div>
				<div class="tile-bet-badge" id="bet-0">0</div>
			</div>
			<div class="mat-tile" data-symbol="1">
				<div class="tile-emoji">🦐</div>
				<div class="tile-name">蝦 (Prawn)</div>
				<div class="tile-bet-badge" id="bet-1">0</div>
			</div>
			<div class="mat-tile" data-symbol="2">
				<div class="tile-emoji">🦀</div>
				<div class="tile-name">蟹 (Crab)</div>
				<div class="tile-bet-badge" id="bet-2">0</div>
			</div>
			<div class="mat-tile" data-symbol="3">
				<div class="tile-emoji">🐓</div>
				<div class="tile-name">雞 (Rooster)</div>
				<div class="tile-bet-badge" id="bet-3">0</div>
			</div>
			<div class="mat-tile" data-symbol="4">
				<div class="tile-emoji">葫</div>
				<div class="tile-name">葫蘆 (Gourd)</div>
				<div class="tile-bet-badge" id="bet-4">0</div>
			</div>
			<div class="mat-tile" data-symbol="5">
				<div class="tile-emoji">🦌</div>
				<div class="tile-name">鹿 (Stag)</div>
				<div class="tile-bet-badge" id="bet-5">0</div>
			</div>
		</div>

		<!-- Bottom controls panel -->
		<div class="control-panel">
			<button class="game-btn" id="clear-btn" style="background: #2b1f3d;">
				🧹 清空下注 (Clear)
			</button>
			<button class="game-btn" id="shake-btn" style="background: linear-gradient(180deg, #ffd700 0%, #b89200 100%); color:#000; text-shadow:none;">
				🎲 搖起骰盅 (Shake)
			</button>
		</div>

		<!-- Excel Camouflage -->
		<div id="camo-overlay">
			<div class="excel-titlebar">
				<span>Microsoft Excel - StupidPig_Betting_Margin_Audit.xlsx</span>
				<span>[扮工中 - 按空白鍵返回遊戲]</span>
			</div>
			<div class="excel-toolbar">
				<span style="font-weight: bold; border-bottom: 2px solid #107c41; padding-bottom: 2px;">檔案</span>
				<span>常用</span>
				<span>模擬數據</span>
				<span>盈虧精算</span>
			</div>
			<div class="excel-grid-container">
				<table class="excel-table">
					<thead>
						<tr>
							<th></th>
							<th>A (下注符號)</th>
							<th>B (本金盈餘)</th>
							<th>C (下注額)</th>
							<th>D (勝率分析)</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td class="excel-cell-header">1</td>
							<td style="font-weight: bold;">魚蝦蟹概率精算日誌</td>
							<td></td>
							<td></td>
							<td></td>
						</tr>
						<tr>
							<td class="excel-cell-header">2</td>
							<td>全體總額</td>
							<td id="excel-score-val" style="color: #0071e3; font-weight: bold;">1000</td>
							<td>100</td>
							<td>16.6%</td>
						</tr>
						<tr>
							<td class="excel-cell-header">3</td>
							<td>魚</td>
							<td></td>
							<td></td>
							<td></td>
						</tr>
						<tr>
							<td class="excel-cell-header">4</td>
							<td>蝦</td>
							<td></td>
							<td></td>
							<td></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<script>
		// Audio Synthesis
		const AudioContext = window.AudioContext || window.webkitAudioContext;
		let audioCtx = null;

		function initAudio() {
			if (!audioCtx) audioCtx = new AudioContext();
			if (audioCtx.state === 'suspended') audioCtx.resume();
		}

		function playSound(type) {
			try {
				initAudio();
				if (!audioCtx) return;
				const now = audioCtx.currentTime;

				if (type === 'rattle') {
					// Dice rattling clacks (wood clicks)
					const count = 4;
					for (let i = 0; i < count; i++) {
						const clackTime = now + i * 0.06 + Math.random() * 0.02;
						const osc = audioCtx.createOscillator();
						osc.type = 'triangle';
						osc.frequency.setValueAtTime(450 + Math.random() * 200, clackTime);
						osc.frequency.exponentialRampToValueAtTime(120, clackTime + 0.04);

						const gain = audioCtx.createGain();
						gain.gain.setValueAtTime(0.2, clackTime);
						gain.gain.exponentialRampToValueAtTime(0.001, clackTime + 0.04);

						osc.connect(gain);
						gain.connect(audioCtx.destination);
						osc.start(clackTime);
						osc.stop(clackTime + 0.05);
					}
				} else if (type === 'clatter') {
					// Plate slamming on wooden table
					const osc = audioCtx.createOscillator();
					osc.type = 'sawtooth';
					osc.frequency.setValueAtTime(150, now);
					osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);

					const gain = audioCtx.createGain();
					gain.gain.setValueAtTime(0.35, now);
					gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

					osc.connect(gain);
					gain.connect(audioCtx.destination);
					osc.start(now);
					osc.stop(now + 0.15);
				} else if (type === 'win') {
					// Happy coins clinking
					for (let i = 0; i < 3; i++) {
						const clinkTime = now + i * 0.1;
						const osc = audioCtx.createOscillator();
						osc.type = 'sine';
						osc.frequency.setValueAtTime(1200 + Math.random() * 300, clinkTime);
						const gain = audioCtx.createGain();
						gain.gain.setValueAtTime(0.25, clinkTime);
						gain.gain.exponentialRampToValueAtTime(0.001, clinkTime + 0.08);
						osc.connect(gain);
						gain.connect(audioCtx.destination);
						osc.start(clinkTime);
						osc.stop(clinkTime + 0.08);
					}
				}
			} catch(e) {
				console.warn(e);
			}
		}

		// Game state
		let wallet = 1000;
		let bets = [0, 0, 0, 0, 0, 0];
		let totalBet = 0;
		let gameState = 'betting'; // betting, shaking, thrown, revealed
		let isCamouflage = false;

		const SYMBOLS = [
			{ name: '魚 (Fish)', emoji: '🐟' },
			{ name: '蝦 (Prawn)', emoji: '🦐' },
			{ name: '蟹 (Crab)', emoji: '🦀' },
			{ name: '雞 (Rooster)', emoji: '🐓' },
			{ name: '葫蘆 (Gourd)', emoji: '葫' },
			{ name: '鹿 (Stag)', emoji: '🦌' }
		];

		// Dice results
		let rolledDice = [0, 1, 2];

		// Animation variables for porcelain bowl
		let bowlX = 400;
		let bowlY = 130;
		let bowlAngle = 0;
		let bowlOffset = { x: 0, y: 0 };
		let bowlShakeTimer = 0;
		let liftHeight = 0; // vertical lift animation for reveal

		let particles = [];
		let textFloats = [];

		const canvas = document.getElementById('game-canvas');
		const ctx = canvas.getContext('2d');

		function resizeCanvas() {
			const container = document.getElementById('game-container');
			canvas.width = container.clientWidth;
			canvas.height = container.clientHeight;
			bowlX = canvas.width * 0.5;
			bowlY = canvas.height * 0.22;
		}
		window.addEventListener('resize', resizeCanvas);
		resizeCanvas();

		const scoreVal = document.getElementById('score-val');
		const stateLabel = document.getElementById('game-state-label');
		const clearBtn = document.getElementById('clear-btn');
		const shakeBtn = document.getElementById('shake-btn');
		const camoOverlay = document.getElementById('camo-overlay');
		const excelScoreVal = document.getElementById('excel-score-val');

		function updateUI() {
			scoreVal.textContent = wallet;
			excelScoreVal.textContent = wallet;

			if (gameState === 'betting') {
				stateLabel.textContent = '點擊木格子下注 (Bet)';
				stateLabel.style.color = 'var(--gold)';
				shakeBtn.textContent = '🎲 搖起骰盅 (Shake)';
				shakeBtn.disabled = (totalBet === 0);
				clearBtn.disabled = false;
			} else if (gameState === 'shaking') {
				stateLabel.textContent = '骰子飛旋中...';
				stateLabel.style.color = '#fff';
				shakeBtn.textContent = '搖動中...';
				shakeBtn.disabled = true;
				clearBtn.disabled = true;
			} else if (gameState === 'thrown') {
				stateLabel.textContent = '買定離手！揭開骰盅';
				stateLabel.style.color = 'var(--neon-blue)';
				shakeBtn.textContent = '揭開骰盅 (Reveal)';
				shakeBtn.disabled = false;
				clearBtn.disabled = true;
			} else if (gameState === 'revealed') {
				stateLabel.textContent = '派彩完畢！再次下注';
				stateLabel.style.color = '#00ff66';
				shakeBtn.textContent = '清空並重新下注 (Reset)';
				shakeBtn.disabled = false;
				clearBtn.disabled = false;
			}
		}

		function placeBet(symbolIndex) {
			if (gameState !== 'betting' || isCamouflage) return;
			if (wallet >= 100) {
				wallet -= 100;
				bets[symbolIndex] += 100;
				totalBet += 100;
				playSound('rattle');

				// Update bet badge
				const badge = document.getElementById(`bet-${symbolIndex}`);
				badge.textContent = bets[symbolIndex];
				badge.style.display = 'block';

				updateUI();
			} else {
				spawnTextFloat("本金不足！", canvas.width * 0.5, canvas.height * 0.5, '#ff3333');
			}
		}

		function clearBets() {
			if (gameState !== 'betting' && gameState !== 'revealed' || isCamouflage) return;

			// Refund current bets to wallet if cleared before shaking
			if (gameState === 'betting') {
				wallet += totalBet;
			}

			bets = [0, 0, 0, 0, 0, 0];
			totalBet = 0;

			// Hide all badges
			for (let i = 0; i < 6; i++) {
				const badge = document.getElementById(`bet-${i}`);
				badge.style.display = 'none';
			}

			if (gameState === 'revealed') {
				gameState = 'betting';
				liftHeight = 0;
			}

			updateUI();
		}

		function startShaking() {
			if (isCamouflage) return;

			if (gameState === 'revealed') {
				clearBets();
				return;
			}

			if (gameState === 'thrown') {
				// Reveal dice
				gameState = 'revealed';
				updateUI();
				revealResults();
				return;
			}

			gameState = 'shaking';
			bowlShakeTimer = 0;
			liftHeight = 0;
			updateUI();
		}

		function revealResults() {
			// Roll 3 random dice
			rolledDice = [
				Math.floor(Math.random() * 6),
				Math.floor(Math.random() * 6),
				Math.floor(Math.random() * 6)
			];

			playSound('clatter');

			// Calculate winnings
			let totalWon = 0;
			let isWin = false;

			// Count occurrences of each rolled symbol
			let rollCounts = [0, 0, 0, 0, 0, 0];
			rolledDice.forEach(d => rollCounts[d]++);

			// Payout logic
			for (let i = 0; i < 6; i++) {
				if (bets[i] > 0 && rollCounts[i] > 0) {
					isWin = true;
					const multiplier = rollCounts[i]; // 1x, 2x, or 3x
					const payout = bets[i] + (bets[i] * multiplier);
					totalWon += payout;
				}
			}

			wallet += totalWon;

			setTimeout(() => {
				if (isWin) {
					playSound('win');
					spawnTextFloat(`恭喜！贏得 +${totalWon} 點`, canvas.width * 0.5, canvas.height * 0.5, '#00ff66');
				} else {
					spawnTextFloat(`落空！損失 -${totalBet} 點`, canvas.width * 0.5, canvas.height * 0.5, '#ff3333');
				}

				// If bankrupt, give a complimentary 1000 tokens
				if (wallet === 0 && totalWon === 0) {
					wallet = 1000;
					spawnTextFloat("神明眷顧！贈送 1000 本金", canvas.width * 0.5, canvas.height * 0.55, 'var(--gold)');
				}

				updateUI();
				submitScoreToParent(wallet);
			}, 500);
		}

		function submitScoreToParent(finalScore) {
			if (window.parent && window.parent !== window) {
				window.parent.postMessage({
					type: 'STUPIDPIG_SCORE_UPDATED',
					gameId: 'fish-prawn-crab',
					score: finalScore
				}, '*');
			}
		}

		function spawnTextFloat(text, x, y, color = '#fff') {
			textFloats.push({
				text: text,
				x: x,
				y: y,
				vy: -1.0,
				alpha: 1.0,
				life: 80,
				color: color
			});
		}

		// Canvas drawing
		function drawAltar(ctx) {
			// Wooden table background
			ctx.fillStyle = '#0f0a17';
			ctx.fillRect(0, 0, canvas.width, canvas.height);

			// Decorative temple altar borders
			ctx.strokeStyle = 'rgba(255, 215, 0, 0.12)';
			ctx.lineWidth = 4;
			ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

			// Draw blue plate base
			ctx.fillStyle = '#f0f5ff';
			ctx.strokeStyle = '#c5d5f5';
			ctx.lineWidth = 4;
			ctx.beginPath();
			ctx.arc(bowlX, bowlY + 15, 80, 0, Math.PI * 2);
			ctx.fill();
			ctx.stroke();

			// Inside circular details of plate
			ctx.strokeStyle = '#a4bfe8';
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.arc(bowlX, bowlY + 15, 60, 0, Math.PI * 2);
			ctx.stroke();
		}

		function drawDice(ctx) {
			if (gameState !== 'revealed') return;

			// Draw 3 dice sitting on plate
			const dicePositions = [
				{ x: bowlX - 25, y: bowlY + 10 },
				{ x: bowlX + 25, y: bowlY + 10 },
				{ x: bowlX, y: bowlY + 28 }
			];

			rolledDice.forEach((d, idx) => {
				const pos = dicePositions[idx];

				// Dice white square
				ctx.fillStyle = '#ffffff';
				ctx.strokeStyle = '#8a3324';
				ctx.lineWidth = 2;
				ctx.beginPath();
				ctx.roundRect(pos.x - 16, pos.y - 16, 32, 32, [4]);
				ctx.fill();
				ctx.stroke();

				// Symbol
				ctx.fillStyle = '#8a3324';
				ctx.font = 'bold 20px sans-serif';
				ctx.textAlign = 'center';
				ctx.fillText(SYMBOLS[d].emoji, pos.x, pos.y + 7);
			});
		}

		function drawBowl(ctx) {
			const x = bowlX + bowlOffset.x;
			const y = bowlY + bowlOffset.y - liftHeight;

			ctx.save();
			ctx.translate(x, y);
			ctx.rotate((bowlAngle * Math.PI) / 180);

			// Shadow
			ctx.fillStyle = 'rgba(0,0,0,0.3)';
			ctx.beginPath();
			ctx.ellipse(0, 20, 68, 12, 0, 0, Math.PI * 2);
			ctx.fill();

			// Wooden brown lacquer bowl cover
			ctx.fillStyle = '#5c2d18';
			ctx.strokeStyle = '#381b0e';
			ctx.lineWidth = 3;
			ctx.beginPath();
			ctx.arc(0, 0, 64, Math.PI, 0, false);
			ctx.closePath();
			ctx.fill();
			ctx.stroke();

			// Gold rings decoration on bowl
			ctx.strokeStyle = '#ffd700';
			ctx.lineWidth = 2.5;
			ctx.beginPath();
			ctx.arc(0, 0, 48, Math.PI, 0, false);
			ctx.stroke();

			// Knob top handle
			ctx.fillStyle = '#ffd700';
			ctx.beginPath();
			ctx.arc(0, -62, 10, 0, Math.PI * 2);
			ctx.fill();

			ctx.restore();
		}

		function updateParticles() {
			for (let i = textFloats.length - 1; i >= 0; i--) {
				const t = textFloats[i];
				t.y += t.vy;
				t.life--;
				if (t.life <= 0) {
					textFloats.splice(i, 1);
				}
			}
		}

		function drawParticles(ctx) {
			ctx.textAlign = 'center';
			textFloats.forEach(t => {
				ctx.save();
				ctx.globalAlpha = Math.min(1.0, t.life / 20);
				ctx.fillStyle = t.color;
				ctx.font = 'bold 16px Arial';
				ctx.shadowColor = '#000';
				ctx.shadowBlur = 3;
				ctx.fillText(t.text, t.x, t.y);
				ctx.restore();
			});
		}

		function gameLoop() {
			updateParticles();

			drawAltar(ctx);
			drawDice(ctx);
			drawBowl(ctx);
			drawParticles(ctx);

			if (!isCamouflage) {
				if (gameState === 'shaking') {
					bowlShakeTimer++;

					// Shaking vibrations
					bowlAngle = Math.sin(bowlShakeTimer * 0.9) * 12;
					bowlOffset.x = Math.cos(bowlShakeTimer * 1.5) * 6;
					bowlOffset.y = Math.sin(bowlShakeTimer * 1.1) * 3;

					if (bowlShakeTimer % 6 === 0) {
						playSound('rattle');
					}

					if (bowlShakeTimer > 90) {
						// Finish shaking
						gameState = 'thrown';
						playSound('clatter');
						bowlAngle = 0;
						bowlOffset = { x: 0, y: 0 };
						updateUI();
					}
				} else if (gameState === 'revealed') {
					// Lift bowl animation
					liftHeight = Math.min(65, liftHeight + 2.5);
				}
			}

			requestAnimationFrame(gameLoop);
		}

		// Place bets triggers on mat tiles
		const tiles = document.querySelectorAll('.mat-tile');
		tiles.forEach(tile => {
			const clickHandler = (e) => {
				e.stopPropagation();
				const symbolIdx = parseInt(tile.getAttribute('data-symbol'), 10);
				placeBet(symbolIdx);
			};

			tile.addEventListener('click', clickHandler);
			tile.addEventListener('touchstart', (e) => {
				e.preventDefault();
				clickHandler(e);
			});
		});

		clearBtn.addEventListener('click', (e) => {
			e.stopPropagation();
			clearBets();
		});

		shakeBtn.addEventListener('click', (e) => {
			e.stopPropagation();
			startShaking();
		});

		function toggleCamouflage() {
			isCamouflage = !isCamouflage;
			if (isCamouflage) {
				camoOverlay.style.display = 'flex';
			} else {
				camoOverlay.style.display = 'none';
			}
		}

		window.addEventListener('keydown', (e) => {
			if (e.code === 'Space') {
				e.preventDefault();
				toggleCamouflage();
			}
		});

		// Initialize
		updateUI();
		gameLoop();
	</script>
</body>
</html>
